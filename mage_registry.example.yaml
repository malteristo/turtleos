# Example registry for turtleOS multi-practitioner routing.
# Copy to mage_registry.yaml and replace placeholders with your Discord IDs,
# channel IDs, and local practice paths. Keep the real file untracked.

# Attunement profile (TURTLE_SPEC §4, Appendix A):
#   native  — vanilla platform law (target default)
#   magic   — legacy magic-attuned persistent Spirit (operator instances during migration)
# attunement: native
#
# Channel types:
#   river         — operator/practitioner main practice surface (acts in parent, dialogue in eddies)
#   hosted-river  — sovereign practitioner's river on operator's server (same harness as river)
#   unclaimed-river — private claim room; becomes hosted-river on river key drop
#   shared        — legacy multi-practitioner dialogue (migrate to shared-river)
#   shared-river  — multi-member space river (acts in parent, shared eddies) — see docs/chapters/design-family-shared-river.md
#   craft         — builder vocation surface (design chapter: docs/chapters/design-craft-channel.md)
#
# Two-bot native mode (TURTLE_SPEC §5.8): set RIVER_BOT_TOKEN in .env and run river_bot.py
# (com.turtle.river). River bot posts acts in the main channel; Turtle bot speaks in eddies.

mages:
  default:
    discord_id: "YOUR_DISCORD_USER_ID"
    address: "Your Name"
    practice_dir: ~/workshops/default
    runtime_dir: ~/workshops/default
    type: mage
    primary: true

spaces:
  shared:
    practice_dir: ~/workshops/shared
    runtime_dir: ~/workshops/shared
    members:
      - default
    # share_policy: who may share TO this space from the Share eddy picker (TURTLE_SPEC §15.6)
    #   all_practitioners — every hosted practitioner on the node (may share without Discord channel membership)
    #   members_only — only space.members
    share_policy: all_practitioners
  family:
    practice_dir: ~/workshops/family
    runtime_dir: ~/workshops/family
    members:
      - nesrine
    share_policy: members_only

# Provision shared-river spaces via !admin space create (see docs/chapters/design-admin-space-provisioning.md)
# Example after: !admin space create lukas_play --members @you @guest --policy all_practitioners
#   spaces.lukas_play + channels.<id> type shared-river + ~/workshops/lukas_play/

channels:
  "YOUR_DIALOGUE_CHANNEL_ID":
    mage: default
    type: river
    default_context: null
    description: Private practice surface

  "YOUR_CRAFT_CHANNEL_ID":
    mage: default
    type: craft
    attunement: craft
    default_context: craft
    description: Craft Turtle builder surface — learning intake for harness/product friction

default_mage: default
